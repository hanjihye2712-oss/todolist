{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Todo App{% endblock %}</title>

  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans KR", Arial, sans-serif; background: #f5f7fb; color: #111827; }

    /* Header */
    .header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(255,255,255,0.92); backdrop-filter: blur(10px);
      border-bottom: 1px solid #e5e7eb;
      width: 100%; padding: 14px max(calc((100% - 980px) / 2), 4vw);
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .header h1 { margin: 0; font-size: 22px; letter-spacing: -0.2px; font-weight: 800; }
    .header h1 a { text-decoration: none; color: inherit; }
    .header > div { display: flex; align-items: center; gap: 10px; }
    hr { border: 0; border-top: 1px solid #e5e7eb; margin: 0; }

    /* Header auth buttons */
    #authWelcome { font-size: 13px; color: #6b7280; padding: 6px 10px; border: 1px solid #e5e7eb; border-radius: 999px; background: #fff; }
    #logoutBtn, #loginLink, #signupLink {
      appearance: none; border: 1px solid #e5e7eb; background: #fff; color: #111827;
      border-radius: 12px; padding: 9px 14px; font-weight: 700; cursor: pointer;
      text-decoration: none; display: inline-flex; align-items: center; gap: 8px;
      transition: transform 0.08s ease, background 0.12s ease, border-color 0.12s ease;
    }
    #logoutBtn:active, #loginLink:active, #signupLink:active { transform: translateY(1px); }
    #logoutBtn:hover, #loginLink:hover { background: #f9fafb; border-color: #d1d5db; }
    #signupLink { background: #2563eb; border-color: #2563eb; color: #fff; }
    #signupLink:hover { background: #1d4ed8; border-color: #1d4ed8; }

    /* Footer */
    .footer, .app-footer {
      text-align: center; font-size: 13px;
      color: #6b7280; padding: 18px 0;
      border-top: 1px solid #e5e7eb; background: #fff;
    }

    @media (max-width: 520px) {
      .header { padding: 12px max(calc((100% - 980px) / 2), 4vw); }
      .header h1 { font-size: 18px; }
    }
  </style>
  {% block css %}{% endblock %}
  <!-- axios는 전체에서 1번만 작성 -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="{% static 'js/api.js' %}"></script>
</head>

<body>
  {% include "header.html" %}

  <main>
    {% block content %}{% endblock %}
  </main>

  {% include "footer.html" %}

  {% block scripts %}{% endblock %}
</body>
</html>
